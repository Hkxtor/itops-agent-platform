name: Mirror to Gitee & Gitcode

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  mirror:
    name: Mirror Code
    runs-on: ubuntu-latest
    if: github.repository == 'qinshihu/itops-agent-platform'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mirror to Gitee
        uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_git_repo: https://gitee.com/IT_Oline/itops-agent-platform.git
          target_git_username: ${{ secrets.GITEE_USERNAME }}
          target_git_password: ${{ secrets.GITEE_PASSWORD }}
        continue-on-error: true

      - name: Mirror to Gitcode
        uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_git_repo: https://gitcode.com/gcw_IM7aAihp/itops-agent-platform.git
          target_git_username: ${{ secrets.GITCODE_USERNAME }}
          target_git_password: ${{ secrets.GITCODE_TOKEN }}
        continue-on-error: true

      - name: Mirror tags
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          git push --tags https://${{ secrets.GITEE_USERNAME }}:${{ secrets.GITEE_PASSWORD }}@gitee.com/IT_Oline/itops-agent-platform.git || true
          git push --tags https://${{ secrets.GITCODE_USERNAME }}:${{ secrets.GITCODE_TOKEN }}@gitcode.com/gcw_IM7aAihp/itops-agent-platform.git || true
