name: Docker Build and Push

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME_BACKEND: itops-backend
  IMAGE_NAME_FRONTEND: itops-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME_BACKEND }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') || github.ref == format('refs/heads/{0}', 'master') }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
          labels: |
            org.opencontainers.image.title=ITOps Agent Platform Backend
            org.opencontainers.image.description=Enterprise IT Operations Multi-Agent Automation Platform - Backend API Server
            org.opencontainers.image.vendor=谭策
            org.opencontainers.image.url=https://www.zjzwfw.cloud/ITOpsAgentinfo
            org.opencontainers.image.licenses=MIT

      - name: Extract metadata (tags, labels) for Frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME_FRONTEND }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') || github.ref == format('refs/heads/{0}', 'master') }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
          labels: |
            org.opencontainers.image.title=ITOps Agent Platform Frontend
            org.opencontainers.image.description=Enterprise IT Operations Multi-Agent Automation Platform - Web UI
            org.opencontainers.image.vendor=谭策
            org.opencontainers.image.url=https://www.zjzwfw.cloud/ITOpsAgentinfo
            org.opencontainers.image.licenses=MIT

      - name: Build and push Backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.backend
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=production

      - name: Build and push Frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.frontend
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'

    steps:
      - name: Test Backend image
        run: |
          docker run --rm -d --name test-backend \
            -e NODE_ENV=production \
            -e JWT_SECRET=test-secret \
            -p 3001:3001 \
            ${{ env.REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME_BACKEND }}:latest
          
          # Wait for health check
          echo "Waiting for backend to start..."
          for i in {1..30}; do
            if curl -f http://localhost:3001/health >/dev/null 2>&1; then
              echo "Backend is healthy!"
              docker stop test-backend
              exit 0
            fi
            sleep 2
          done
          
          echo "Backend failed to start"
          docker logs test-backend
          docker stop test-backend
          exit 1

      - name: Test Frontend image
        run: |
          docker run --rm -d --name test-frontend \
            -p 8080:80 \
            ${{ env.REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME_FRONTEND }}:latest
          
          # Wait for nginx to start
          echo "Waiting for frontend to start..."
          for i in {1..15}; do
            if curl -f http://localhost:8080/ >/dev/null 2>&1; then
              echo "Frontend is healthy!"
              docker stop test-frontend
              exit 0
            fi
            sleep 2
          done
          
          echo "Frontend failed to start"
          docker logs test-frontend
          docker stop test-frontend
          exit 1
